name: 오하아사 크롤러 자동화

on:
  schedule:
    # 한국 시간(KST) 오전 5시 50분 = 영국 표준시(UTC) 전날 오후 8시 50분 (20:50)
    # 깃허브 액션은 오직 UTC 기준 cron만 정확하게 인식합니다.
    - cron: '50 20 * * *'
  workflow_dispatch: # 필요할 때 언제든 수동으로 실행할 수 있는 버튼

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    # 1. 저장소의 최신 소스코드 가져오기
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    # 2. 파이썬 개발 환경 구축
    - name: 파이썬 3.10 설치
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 크롤링 및 번역에 필요한 라이브러리 일괄 설치
    - name: 의존성 라이브러리 설치
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 4. 동적 웹 크롤링을 위한 Playwright 브라우저 엔진 설치
    - name: Playwright 크롬 엔진 설치
      run: |
        pip install playwright
        playwright install chromium

    # 5. 수정한 크롤러 파이썬 스크립트 실행
    - name: 크롤러(scrape.py) 실행
      run: python scrape.py

    # 6. 푸시 튕김 현상을 방지하는 안전 커밋 및 푸시 시스템
    - name: 변경사항(fortune.json)을 깃허브에 커밋 및 푸시
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        git add fortune.json
        
        if ! git diff --quiet || ! git diff --staged --quiet; then
          git commit -m "Update fortune.json ($(date +'%Y-%m-%d %H:%M'))"
          git pull --rebase origin main
          git push origin main
        else
          echo "업데이트할 변경사항이 없습니다."
        fi
