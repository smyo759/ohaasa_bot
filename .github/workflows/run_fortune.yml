name: Daily Fortune Crawler

on:
  schedule:
    # 한국 시간 기준 매일 오전 6시 00분에 실행 (UTC 기준 전날 오후 9시 00분)
    - cron: '00 21 * * *'
  workflow_dispatch: # 필요할 때 언제든 버튼을 눌러 수동으로 실행할 수 있는 옵션

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 저장소 코드 가져오기
      uses: actions/checkout@v4

    - name: 파이썬 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 deep-translator playwright
        playwright install chromium

    - name: 크롤러 실행
      run: python scrape.py # 👈 파일 이름을 scrape.py로 맞추었습니다.

    - name: 변경사항(JSON)을 깃허브에 커밋 및 푸시
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add fortune.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update fortune.json ($(date +'%Y-%m-%d'))" && git push)
